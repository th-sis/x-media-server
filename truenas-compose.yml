# ══════════════════════════════════════════════════════════════
# X-Media Server v0.2.0 — TrueNAS SCALE 25.10 (Goldeye)
#
# 全栈一体化交付: 一键部署 → 一个面板 → 零碎片配置
# ============================================================
# Sidecar 清单:
#   openlist  — 存储抽象层（115/夸克/阿里/123/PikPak 统一管理）
#   pansou    — 盘搜聚合代理（透传外部搜索 API，配置收拢到面板）
#
# 用户只需在 x-media 管理面板配置:
#   ① TMDB API Key   ② OpenList Token   ③ 115 扫码登录
#   ④ 盘搜引擎（BaseURL/Headers/Regex 可热编辑）
# ══════════════════════════════════════════════════════════════

services:
  # ── OpenList 存储抽象层 (Sidecar) ──
  openlist:
    image: openlistteam/openlist:latest-lite
    container_name: xm-openlist
    restart: unless-stopped
    user: "568:568"
    ports:
      - "5244:5244"
    environment:
      # 配置收拢：管理密码由主编排注入，用户无需单独进 OpenList 后台
      OPENLIST_PORT: "5244"
      # OPENLIST_ADMIN_TOKEN 由我们面板统一管理，消除碎片化
    volumes:
      - /mnt/IPT-FILES/XXY-FILE/x-media-server/openlist/data:/opt/openlist/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5244/api/public/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── X-Media Server (Go 后端 + 管理面板) ──
  x-media-server:
    image: thsis/x-media-server:latest
    container_name: x-media-server
    restart: unless-stopped
    depends_on:
      openlist:
        condition: service_healthy

    user: "568:568"

    ports:
      - "35678:35678"
      - "50051:50051"

    environment:
      SERVER_GRPC_PORT: ":50051"
      SERVER_HTTP_PORT: ":35678"
      SERVER_EXTERNAL_URL: "http://192.168.7.154:35678"
      AUTH_JWT_SECRET: "x-media-jwt-change-me-to-random-string"
      AUTH_ADMIN_USER: "admin"
      AUTH_ADMIN_PASS: "admin"
      DB_PATH: "/app/data/xmedia.db"
      TMDB_API_KEY: ""
      # 配置下沉：OpenList 地址由环境变量注入，面板可热改
      OPENLIST_URL: "http://openlist:5244"
      PROXY_HTTP: ""
      PROXY_HTTPS: ""
      LOG_LEVEL: "debug"

    volumes:
      - /mnt/IPT-FILES/XXY-FILE/x-media-server/data:/app/data
      - /mnt/IPT-FILES/XXY-FILE/x-media-server/img_cache:/app/img_cache

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:35678/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
