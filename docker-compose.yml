# ══════════════════════════════════════════════════════════════
# X-Media Server v0.2.0 — 通用 Docker Compose
#
# 部署: docker compose up -d
# 访问: http://localhost:35678/config
# ══════════════════════════════════════════════════════════════

services:
  # ── OpenList 存储抽象层 (Sidecar) ──
  openlist:
    image: openlistteam/openlist:latest-lite
    container_name: xm-openlist
    restart: unless-stopped
    ports:
      - "5244:5244"
    environment:
      OPENLIST_PORT: "5244"
    volumes:
      - ./openlist/data:/opt/openlist/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5244/api/public/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── X-Media Server (Go 后端 + 管理面板) ──
  x-media-server:
    image: thsis/x-media-server:latest
    container_name: x-media-server
    restart: unless-stopped
    depends_on:
      openlist:
        condition: service_healthy

    ports:
      - "35678:35678"
      - "50051:50051"

    environment:
      SERVER_GRPC_PORT: ":50051"
      SERVER_HTTP_PORT: ":35678"
      SERVER_EXTERNAL_URL: "http://localhost:35678"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET:-x-media-jwt-change-me}"
      AUTH_ADMIN_USER: "${AUTH_ADMIN_USER:-admin}"
      AUTH_ADMIN_PASS: "${AUTH_ADMIN_PASS:-admin}"
      DB_PATH: "/app/data/xmedia.db"
      TMDB_API_KEY: "${TMDB_API_KEY}"
      OPENLIST_URL: "http://openlist:5244"
      PROXY_HTTP: "${PROXY_HTTP}"
      PROXY_HTTPS: "${PROXY_HTTPS}"
      LOG_LEVEL: "${LOG_LEVEL:-debug}"

    volumes:
      - ./data:/app/data
      - ./img_cache:/app/img_cache

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:35678/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
